<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>store</title>
    <style>
        @font-face {
            font-family: font1;
            src: url("font1.woff2") format(woff2);
        }
        body {
            margin: 0;
        }
        header {
            height: 75px;
            box-shadow: 0 0px 11px 1px;
            background: #b90000;
            display: flex;
            align-items: center;
            justify-content: start;
            direction: rtl;
            margin-bottom: 10px;
        }
        .header-img1 {
            width: 55px;
            border-radius: 50px;
            margin: 10px;
        }
        .header-span1 {
            font-family: font1;
            font-size: 14px;
            color: white;
        }
        .span1, .span2, .span3 {
            font-family: 'font1';
            font-size: 13px;
            color: #3b3b3b;
            margin: 0 10px;
        }
        .nemoone-kar {
            background: #f9f9f9;
            margin: 10px;
            border-radius: 8px;
            box-shadow: 0 0 5px 1px #8b8b8b;
            border-right: 4px solid #b90000;
            padding: 0 0 10px 0;
        }
        .nemoone-kar-div1 {
            display: flex;
            direction: rtl;
            justify-content: start;
            align-items: center;
            padding: 10px;
        }
        .nemoone-kar-div1-span1 {
            font-family: font1;
            color: rgb(37, 37, 37);
        }
        .nemoone-kar-div1-div1 {
            background: #818181;
            height: 0.05rem;
            width: 70%;
            margin: 0 12px;
        }
        .nemoone-kar-img1 {
            width: 160px;
            border-radius: 5px;
            margin: 5px 8px;
        }
        .nemoone-kar-div2 {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: center;
        }
        .nemoone-kar-div3 {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: end;
        }
        .nemoone-kar-div3-span1 {
            direction: rtl;
            font-family: font1;
            margin: 0 18px;
            color: #0043ff;
        }
    </style>
</head>
<body>
    <header>
        <img src="header-photo.jpg" class="header-img1">
        <span class="header-span1">دکوراسیون فلزی و چوبی کرمان</span>

    <div style="direction: rtl;display: flex;flex-direction: column;">

        <span class="span2">خونت رو با ما خوشگل کن !</span>
        <span class="span3">ارسال به سراسر کشور .</span>
    </div>
    <div class="nemoone-kar">

        </div>
        <div class="nemoone-kar-div2">
            <img src="nemoone1.jpg" class="nemoone-kar-img1">

            <img src="nemoone3.jpeg" class="nemoone-kar-img1">

        </div>

            <img src="nemoone7.jpeg" class="nemoone-kar-img1">
            <img src="nemoone8.jpeg" class="nemoone-kar-img1">                                                                               
        </div>
        <div class="nemoone-kar-div3">
            <a href="not_found_page.html" style="direction: rtl;text-decoration: none;">
                <span class="nemoone-kar-div3-span1">بیشتر ...</span>

    <div class="nemoone-kar">
